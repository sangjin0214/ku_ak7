<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Notification Alert</title>
    <script>
        window.onload = function() {
            {% if message %}
                alert("처리된 값: {{ message }}");
            {% endif %}
        };
    </script>
</head>
<body>
    <h1>비밀번호 검색</h1>
    <form action="/root/login_result" method="POST">
        <input type="text" name="user_id" placeholder="학번을 입력하세요..">
        <button type="submit">검색</button>
    </form>
</body>
</html>
