<html>
  <head>
    <style>
        fieldset {
            width: 95%;
            padding: 2%; /* 상하좌우 패딩을 20px로 설정 */
            border: 2px solid #ccc; /* 테두리 설정 */
            border-radius: 5px; /* 모서리 둥글게 */
        }
    </style>
  </head>
  <body>
    <h1></h1>
    <form action="/root/login_result" method="POST">
      <fieldset>
        <legend>세부사항 입력</legend>
        작성자<br>
        <input type="text" name="applicant_name" placeholder="ex) TA Paul" style="width:100%;">
        <br><br>
        학생 이름<br>
        <input type="text" name="student_name" placeholder="(A)/(B) 포함" style="width:100%;">
        <br><br>
        물품명<br>
        <input type="text" name="goods_name" style="width:100%;">
        <br><br>
        세부설명<br>
        <input type="text" name="description" placeholder="물건 위치나 물건 설명해주세요!" style="width:100%;height:100;">
        <br><br>
        <input type="submit" value="submit">
      </fieldset>
    </form>
  </body>
</html>
